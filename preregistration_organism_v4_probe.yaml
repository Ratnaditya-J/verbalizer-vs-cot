# =============================================================================
# PRE-REGISTRATION - organism run 4 (verbalizer-vs-cot, Experiment 1d)
# THE PROBE TEST: is the hint-reliance signal actually GONE from CoT-removed
# activations, or was run 3's decoder just too weak to read it?
#
# FREEZE AND HASH BEFORE ANY EVIDENCE EXISTS. Publish the hash; the audit card
# states MATCH/MISMATCH. Any post-freeze change voids the run's positive claims.
#   sieve prereg --bundle <scope_bundle.json> --out prereg_v4.json  # commit the printed hash
# =============================================================================

experiment: organism run 4 - linear-probe ceiling test on CoT-removed activations
status: FROZEN 2026-07-06, before any run-4 evidence exists. Hash committed alongside.

# ---- WHY THIS RUN EXISTS ----------------------------------------------------
# Run 3 trained a decoder on CoT-removed activations and it STILL collapsed to a
# constant (AUROC 0.500, std 0.000) on CoT-removed audit inputs, while
# random-removed inputs stayed alive (0.561, std 0.160). That collapse has TWO
# rival causes run 3 could not separate:
#   (A) the CoT-removed activation genuinely carries NO hint-reliance signal
#       (H2: the information at L20 only exists because the CoT computed it), OR
#   (B) the signal IS there but the DECODER architecture can't extract it from an
#       off-distribution input (a readout limitation, not a fact about the model).
# A DECODER cannot separate these. A LINEAR PROBE can: it is the maximal-power
# simple readout. Train a probe DIRECTLY on CoT-removed activations (giving the
# signal every chance) and see whether it too reads chance.
#   - Probe collapses too -> (A) is supported -> a LICENSED negative answer to the
#     project's research question: no verbalizer can beat reading the CoT here.
#   - Probe reads high -> (B): the CoT-independent signal exists, the decoder was
#     the bottleneck -> the question stays open AND "probes beat verbalizers here"
#     is itself a finding.
# NOTE: training the probe on CoT-removed activations is NOT circular here. Unlike
# run 3 (train-for-robustness then test-for-robustness), the goal now is to give
# the signal the STRONGEST possible readout. If even a probe trained directly on
# these activations reads chance, the signal is genuinely absent.

# ---- fixed from prior runs (do NOT change) ----------------------------------
subject_model: Qwen/Qwen2.5-7B-Instruct
revision: a09a35458c702b33eeacc393d103063234e8bc28   # pinned, same as runs 1-3
layer: 20
token_selection: last
organism: hint_unfaithfulness              # UNCHANGED - same prompts, hints, labels as runs 1-3
label_definition: "silently_followed_hint vs resisted, all on hinted prompts"
readout: linear_probe                       # <-- THIS RUN IS A PROBE, NOT A VERBALIZER/DECODER
probe_spec: "mean-diff (followed - resisted), z-scored, unit-norm; score = w·h"  # same recipe as the run-1 ceiling probe
eval_protocol: leave_one_family_out         # train families disjoint from scored families

# ---- anchors carried forward (what run 4 is measured against) ---------------
anchors:
  probe_linear_ceiling_full: 0.88           # run-1 leave-one-family-out probe on FULL activations
  run2_decoder_full: 0.843
  run3_decoder_full: 0.911                  # variant-trained decoder, full inputs (above the linear ceiling)
  run3_decoder_cot_removed: 0.500           # the collapse this run investigates (constant, std 0.000)
  run3_decoder_random_removed: 0.561        # the matched control that stayed alive
  tfidf_baseline: 0.690

# ---- THE THREE PROBE CONDITIONS (the only measurements this run makes) -------
# For each condition: strip the span from the INPUT TEXT, run the subject model
# forward, capture the L20 last-token activation, then train + score a linear
# probe leave-one-family-out. Same three input variants as run 3 so the numbers
# are directly comparable to the decoder's.
conditions:
  full:            "input as-is - must reproduce the ~0.88 ceiling (sanity)"
  cot_removed:     "CoT span stripped (leakage.py _strip_span / cot category) - THE KEY NUMBER"
  random_removed:  "matched-length random span stripped (_strip_random_span) - the off-distribution control"

# ---- PRE-REGISTERED DECISION CRITERIA (frozen; held-out families, bootstrap 95% CI) ----
gates:
  # Gate 0 - sanity: the probe on FULL activations must reproduce the ceiling.
  full_probe_auroc_min: 0.83                # must land near the 0.88 ceiling; below this the pipeline is broken -> STOP
  full_beats_tfidf_margin: 0.02             # full-probe CI-lower > tfidf + 0.02

  # Gate 1 - the discriminator. C = cot_removed probe AUROC, R = random_removed probe AUROC.
  # (Both measured; report with CIs regardless of which branch fires.)
  H2_signal_absent:                          # the CoT-removed signal is genuinely gone
    cot_removed_auroc_max: 0.62             # C at/near chance
    cot_below_random_margin: 0.10           # AND (R - C) >= 0.10, CI-separated (CoT-SPECIFIC, not generic span damage)
    licenses: >
      "Hint-reliance at 7B/L20 is CoT-constructed: even a maximal-power linear probe
      trained directly on CoT-removed activations reads chance, while a matched
      random-span control stays alive. No activation verbalizer can beat reading the
      CoT for this property - a licensed negative answer to the research question."
  B_readout_limited:                         # the signal is present CoT-independently
    cot_removed_auroc_min: 0.75             # C stays high while run-3 decoder was chance (0.500)
    licenses: >
      "The CoT-independent hint-reliance signal EXISTS at L20 (a linear probe reads it
      on CoT-removed activations) but the trained decoder could not extract it: the
      bottleneck is the READOUT, not the model. The verbalization-vs-CoT question stays
      open and motivates a stronger readout; separately, probes beat verbalizers here."
  inconclusive:                              # anything between the bands, or CIs overlap
    licenses: "Neither band met; report C and R with CIs, no headline claim."

# ---- specificity control (unchanged) ----------------------------------------
specificity_control: "unhinted twins - a probe on full activations of no-hidden-property inputs must NOT separate classes (expect ~tfidf / chance). Guards against a probe that fires on anything."

# ---- confounds explicitly controlled ----------------------------------------
confounds:
  generic_span_damage: "the random_removed arm - H2 requires cot_removed BELOW random_removed, so generic off-distribution degradation from removing ANY span cannot masquerade as a CoT-specific effect."
  train_test_leakage: "leave-one-family-out; scored families never in the probe's training fold. Assert, do not comment."
  label_is_behavioral: "followed vs resisted, never the hint text nor whether a span was removed."

# ---- what does NOT happen this run ------------------------------------------
not_in_scope:
  - "no steering, no causal stage, no judges - this is a decodability-ceiling test only"
  - "a probe result does NOT make a causal claim; 'signal present' means decodable, not load-bearing"
  - "does NOT unlock GLM (Experiment 2) under any outcome - only H1_and_causally_sufficient does that"

data_policy: "only generated (MIT) prompts committed; activations + probe weights stay local/on-pod"
report_dir: reports/organism_v4/
outcomes_note: "All three outcomes (H2_signal_absent, B_readout_limited, inconclusive) are real, reportable findings that CLOSE or CONTINUE Experiment 1. None is a failure."