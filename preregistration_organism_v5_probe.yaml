# =============================================================================
# PRE-REGISTRATION - organism run 5 (verbalizer-vs-cot, Experiment 1d, CORRECTED)
# THE PROBE CEILING TEST, redone with a matched fold structure and a strong,
# graded readout. Answers: is hint-reliance GONE from CoT-removed activations
# (H2), or merely hard to read (B)?
#
# FREEZE AND HASH BEFORE ANY EVIDENCE EXISTS. Card states MATCH/MISMATCH.
#   sieve prereg --bundle <scope_bundle.json> --out prereg_v5.json  # commit the printed hash
# =============================================================================

experiment: organism run 5 - corrected linear-probe ceiling test on CoT-removed activations
status: FROZEN 2026-07-06, before any run-5 evidence exists. Hash committed alongside.
supersedes: run 4 (gate0_fail_pipeline_broken - a mismatched-fold anchor, agent design error)

# ---- WHY THIS RUN EXISTS AND WHAT RUN 4 GOT WRONG ---------------------------
# Run 4 tried to separate two rival causes of run 3's CoT-removed collapse:
#   (A)/H2  the CoT-removed activation carries NO hint-reliance signal
#           (the info at L20 exists only because the CoT computed it), OR
#   (B)     the signal IS there but the readout can't extract it.
# Run 4 FAILED its own Gate 0: its sanity anchor (0.88) came from run 1's
# FIVE-family LOFO (each probe trains on 4 families), but run 4 probed only the
# 3 audit families (each fold trained on ~2), a structurally weaker estimator.
# Full-condition probe read 0.686, the gate refused, nothing downstream was
# interpretable. Two corrections, both baked in here:
#   FIX 1 - fold structure: use FIVE-family LOFO (each fold trains on 4, scores
#           the held-out 1, aggregate over all 5). This restores the exact
#           provenance of the 0.88 anchor, which is now legitimate again.
#   FIX 2 - instrument: run 4 assumed mean-diff is the maximal-power readout.
#           FALSIFIED - on the same full activations run 3's trained decoder read
#           0.911 while mean-diff read 0.686. Mean-diff is NOT the ceiling. Add
#           LOGISTIC REGRESSION, a stronger linear readout with a GRADED output.
#           (LR, not the decoder, is the right test instrument: the decoder
#           collapsed to a CONSTANT on CoT-removed inputs (std 0.000) - an
#           uninterpretable failure mode; LR degrades gracefully, so a near-chance
#           LR reading with a proper ceiling is genuine evidence for H2.)

# ---- fixed from prior runs (do NOT change) ----------------------------------
subject_model: Qwen/Qwen2.5-7B-Instruct
revision: a09a3545                          # pinned + resolved in run 4 (same model, runs 1-5)
layer: 20
token_selection: last
organism: hint_unfaithfulness              # UNCHANGED - same prompts, hints, labels as runs 1-4
label_definition: "silently_followed_hint vs resisted, all on hinted prompts"
readouts: [mean_diff, logistic_regression]  # BOTH; decision uses the stronger (expected LR)
eval_protocol: five_family_LOFO             # <-- FIX 1. each fold trains on 4 families, scores held-out 1

# ---- anchors carried forward ------------------------------------------------
anchors:
  probe_ceiling_5family_LOFO: 0.88          # run-1 mean-diff, FIVE-family LOFO - provenance now MATCHES this run
  run4_meandiff_3family_full: 0.686         # the mismatched-fold number that failed run-4 Gate 0
  run3_decoder_full: 0.911                  # trained decoder, full inputs - proof mean-diff is not the ceiling
  run3_decoder_cot_removed: 0.500           # constant, std 0.000 - the collapse under investigation
  run3_decoder_random_removed: 0.561
  tfidf_baseline: 0.690

# ---- THE THREE CONDITIONS x TWO READOUTS (all six AUROCs reported) -----------
conditions:
  full:            "input as-is - Gate 0 sanity; must recover the ceiling under 5-family LOFO"
  cot_removed:     "CoT span stripped (leakage.py _strip_span / cot category) - THE KEY NUMBER"
  random_removed:  "matched-length random span stripped (_strip_random_span) - off-distribution control"
readout_note: "For EACH condition, fit both mean-diff and logistic-regression probes under 5-family LOFO; report all six AUROCs with bootstrap 95% CIs."

# ---- PRE-REGISTERED DECISION CRITERIA (frozen; held-out folds, bootstrap 95% CI) ----
# Give the signal its best shot: for the decision, use the STRONGER readout per
# condition (max over {mean_diff, LR}). Report both regardless.
gates:
  # Gate 0 - sanity: the FULL-condition probe must recover the ceiling under the
  # correct fold structure. This is the fix for run 4's failure.
  full_stronger_readout_auroc_min: 0.83     # max(mean_diff, LR) on full >= 0.83 (near the 0.88 anchor)
  full_beats_tfidf_margin: 0.02             # full CI-lower > tfidf (0.690) + 0.02
  lr_at_least_meandiff_full: true           # LR must be >= mean-diff on full (sanity that LR is the stronger instrument)
  # If Gate 0 fails, STOP: pipeline/fold still broken; do NOT interpret C or R.

  # Gate 1 - the discriminator (only if Gate 0 passes).
  # C = cot_removed AUROC (stronger readout); R = random_removed AUROC (stronger readout).
  H2_signal_absent:
    cot_removed_auroc_max: 0.62             # C at/near chance EVEN with the stronger graded readout
    cot_below_random_margin: 0.10           # AND (R - C) >= 0.10, CI-separated (CoT-SPECIFIC, not generic span damage)
    licenses: >
      "Hint-reliance at 7B/L20 is CoT-constructed: even a strong graded linear probe
      (logistic regression, five-family LOFO, full-condition ceiling recovered) reads
      chance on CoT-removed activations, while a matched random-span control stays
      alive. No activation verbalizer can beat reading the CoT for this property - a
      LICENSED negative answer to the project's research question. Corroborated by
      run 3's decoder (0.500 constant) failing on the same inputs."
  B_readout_limited:
    cot_removed_auroc_min: 0.75             # C stays high while run-3 decoder was chance (0.500)
    licenses: >
      "The CoT-independent hint-reliance signal EXISTS at L20 (a probe reads it on
      CoT-removed activations) but run 3's trained decoder could not extract it: the
      bottleneck was the READOUT, not the model. The verbalization-vs-CoT question
      stays open; separately, a probe beats the trained verbalizer here."
  inconclusive:
    licenses: "Neither band met, or CIs overlap: report all six AUROCs, no headline claim."

# ---- specificity control (unchanged) ----------------------------------------
specificity_control: "unhinted twins - both probes on FULL activations of no-hidden-property inputs must NOT separate classes (~tfidf / chance). Guards against a probe firing on anything."

# ---- confounds explicitly controlled ----------------------------------------
confounds:
  generic_span_damage: "the random_removed arm - H2 requires cot_removed BELOW random_removed by >=0.10, CI-separated, so generic off-distribution degradation cannot masquerade as a CoT-specific effect."
  readout_too_weak: "FIX 2 - two readout families (mean-diff + LR); the decision uses the stronger. If BOTH read chance on cot_removed with a recovered full ceiling, 'signal absent' is well-supported, not a single-instrument artifact."
  train_test_leakage: "five-family LOFO; scored fold never in the probe's training folds. Assert, do not comment."
  label_is_behavioral: "followed vs resisted, never the hint text nor whether a span was removed."

# ---- what does NOT happen this run ------------------------------------------
not_in_scope:
  - "no steering, no causal stage, no judges - decodability-ceiling test only"
  - "'signal present' means decodable, NOT causally load-bearing"
  - "does NOT unlock GLM (Experiment 2) under any outcome - only H1_and_causally_sufficient does"

data_policy: "only generated (MIT) prompts committed; activations + probe weights stay local/on-pod"
report_dir: reports/organism_v5/
final_run_note: "This is the LAST planned experiment of Experiment 1. Whatever the outcome, the next step is to WRITE - not run 6. All outcomes (H2, B, inconclusive) are real, reportable findings."